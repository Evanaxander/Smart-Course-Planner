<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Smart Course Planner</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            color: white;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        h1, h2 {
            color: #fff;
        }

        p {
            color: #ddd;
        }

        .section {
            margin-bottom: 30px;
        }

        input {
            padding: 10px;
            border: none;
            border-radius: 5px;
            width: 100%;
            max-width: 300px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            background: #4ca1af;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Panel</h1>
        <p>Manage courses, student data, and system settings.</p>
        
        <!-- Manage Courses -->
        <div class="section">
            <h2>Manage Courses</h2>
            <input type="text" placeholder="Add new course (e.g., CS101)">
            <button>Add Course</button>
        </div>

        <!-- Manage Students -->
        <div class="section">
            <h2>Manage Students</h2>
            <input type="text" placeholder="Search student by ID">
            <button>Search</button>
        </div>

        <!-- System Settings -->
        <div class="section">
            <h2>System Settings</h2>
            <button>Update Settings</button>
        </div>
    </div>
</body>
</html>
