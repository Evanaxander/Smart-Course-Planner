<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Prediction - Smart Course Planner</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            color: white;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        h1, h2 {
            color: #fff;
        }

        p {
            color: #ddd;
        }

        .cgpa-display {
            text-align: center;
            margin: 20px 0;
        }

        .cgpa-display span {
            font-size: 2.5em;
            color: #4ca1af;
        }

        .section {
            margin-bottom: 30px;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        ul li {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CGPA Prediction</h1>
        <p>Your predicted CGPA based on selected courses:</p>
        
        <!-- CGPA Display -->
        <div class="cgpa-display">
            <h2>Predicted CGPA: <span>3.75</span></h2>
        </div>

        <!-- Course List -->
        <div class="section">
            <h2>Selected Courses</h2>
            <ul>
                <li>CS101 - Introduction to Computer Science</li>
                <li>MATH201 - Advanced Mathematics</li>
                <li>PHY301 - Physics for Engineers</li>
            </ul>
        </div>
    </div>
</body>
</html>
